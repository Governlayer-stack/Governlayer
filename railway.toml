[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
startCommand = "python -c 'import os,uvicorn;uvicorn.run(\"src.main:app\",host=\"0.0.0.0\",port=int(os.environ.get(\"PORT\",8000)),workers=2)'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
