[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
startCommand = "python -m alembic upgrade head || echo 'ALEMBIC FAILED - continuing anyway'; python -c 'import os,uvicorn;uvicorn.run(\"src.main:app\",host=\"0.0.0.0\",port=int(os.environ.get(\"PORT\",8000)),workers=2)'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
