<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — GovernLayer</title>
<meta name="theme-color" content="#0a0e1a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1e293b;--border:rgba(255,255,255,.1);
  --border-hover:rgba(255,255,255,.2);
  --text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;
  --green:#10b981;--green-hover:#059669;--green-bg:rgba(16,185,129,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);
}
html{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;position:relative}
.glow{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.06) 0%,rgba(59,130,246,.04) 40%,transparent 70%);pointer-events:none}
.nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:1.1rem;color:var(--text);text-decoration:none}
.nav-logo:hover{text-decoration:none}
.nav-logo svg{width:28px;height:28px}
.card{width:100%;max-width:420px;position:relative;z-index:1}
.card-header{text-align:center;margin-bottom:2rem}
.card-header h1{font-size:1.6rem;font-weight:700;margin-bottom:.4rem}
.card-header p{color:var(--muted);font-size:.9rem}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:.8125rem;font-weight:600;color:var(--muted);margin-bottom:.4rem}
.input-wrap{position:relative}
.field input{width:100%;padding:.75rem 1rem;font-size:.9375rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:border .2s}
.field input:focus{border-color:var(--green)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:.8rem;padding:4px}
.pw-toggle:hover{color:var(--muted)}
.pw-strength{height:3px;border-radius:2px;margin-top:6px;background:var(--surface2);overflow:hidden}
.pw-strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}
.submit-btn{width:100%;padding:.8rem;font-size:.9375rem;font-weight:600;background:var(--green);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background .2s}
.submit-btn:hover{background:var(--green-hover)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:var(--red-bg);border:1px solid rgba(239,68,68,.2);color:var(--red);padding:.75rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
.success-msg{background:var(--green-bg);border:1px solid rgba(16,185,129,.2);color:var(--green);padding:.75rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
.invalid-token{text-align:center;padding:3rem 1rem}
.invalid-token h2{font-size:1.3rem;margin-bottom:.75rem}
.invalid-token p{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem}
.invalid-token a{display:inline-block;padding:.6rem 1.5rem;background:var(--green);color:#fff;border-radius:10px;font-weight:600;font-size:.9rem}
.invalid-token a:hover{background:var(--green-hover);text-decoration:none}
.footer{text-align:center;padding:1.5rem;font-size:.75rem;color:var(--dim);border-top:1px solid var(--border)}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    GovernLayer
  </a>
</nav>

<main class="page">
  <div class="glow"></div>
  <div class="card">
    <!-- Invalid/missing token state -->
    <div id="invalidState" class="invalid-token" style="display:none;">
      <h2>Invalid or expired link</h2>
      <p>This password reset link is no longer valid. Please request a new one.</p>
      <a href="/forgot-password">Request new link</a>
    </div>

    <!-- Reset form -->
    <div id="resetForm">
      <div class="card-header">
        <h1>Set new password</h1>
        <p>Enter your new password below.</p>
      </div>
      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>
      <form id="form">
        <div class="field">
          <label for="password">New password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
            <button type="button" class="pw-toggle" id="pwToggle">Show</button>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
        </div>
        <div class="field">
          <label for="confirm">Confirm password</label>
          <div class="input-wrap">
            <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password" required minlength="8">
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Reset password</button>
      </form>
    </div>
  </div>
</main>

<footer class="footer">&copy; 2026 GovernLayer. All rights reserved.</footer>

<script>
const API = window.location.origin;
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

const invalidState = document.getElementById('invalidState');
const resetFormEl = document.getElementById('resetForm');
const form = document.getElementById('form');
const pwInput = document.getElementById('password');
const confirmInput = document.getElementById('confirm');
const pwToggle = document.getElementById('pwToggle');
const pwBar = document.getElementById('pwBar');
const errorEl = document.getElementById('error');
const successEl = document.getElementById('success');
const submitBtn = document.getElementById('submitBtn');

// No token — show invalid state
if (!token || token.length < 32) {
  resetFormEl.style.display = 'none';
  invalidState.style.display = 'block';
}

function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; successEl.style.display = 'none'; }
function showSuccess(msg) { successEl.textContent = msg; successEl.style.display = 'block'; errorEl.style.display = 'none'; }

// Password toggle
pwToggle.addEventListener('click', () => {
  const hidden = pwInput.type === 'password';
  pwInput.type = hidden ? 'text' : 'password';
  confirmInput.type = hidden ? 'text' : 'password';
  pwToggle.textContent = hidden ? 'Hide' : 'Show';
});

// Password strength
pwInput.addEventListener('input', () => {
  const v = pwInput.value;
  let s = 0;
  if (v.length >= 8) s++;
  if (v.length >= 12) s++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
  if (/\d/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  const pct = Math.min(s / 5 * 100, 100);
  pwBar.style.width = pct + '%';
  pwBar.style.background = pct < 40 ? '#ef4444' : pct < 70 ? '#f59e0b' : '#10b981';
});

// Submit
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';
  successEl.style.display = 'none';

  const pw = pwInput.value;
  const confirm = confirmInput.value;

  if (pw.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (pw !== confirm) { showError('Passwords do not match.'); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Resetting...';

  try {
    const res = await fetch(API + '/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, new_password: pw }),
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('Password reset successfully. Redirecting to login...');
      submitBtn.textContent = 'Done';
      setTimeout(() => { window.location.href = '/login'; }, 2000);
    } else {
      if (data?.detail?.includes?.('expired') || data?.detail?.includes?.('Invalid')) {
        resetFormEl.style.display = 'none';
        invalidState.style.display = 'block';
      } else {
        showError(data?.detail || 'Something went wrong. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset password';
      }
    }
  } catch (err) {
    showError('Network error. Please try again.');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Reset password';
  }
});
</script>
</body>
</html>
