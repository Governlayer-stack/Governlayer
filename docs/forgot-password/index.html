<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — GovernLayer</title>
<meta name="theme-color" content="#0a0e1a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1e293b;--border:rgba(255,255,255,.1);
  --border-hover:rgba(255,255,255,.2);
  --text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;
  --green:#10b981;--green-hover:#059669;--green-bg:rgba(16,185,129,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);
}
html{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;position:relative}
.glow{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.06) 0%,rgba(59,130,246,.04) 40%,transparent 70%);pointer-events:none}
.nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:1.1rem;color:var(--text);text-decoration:none}
.nav-logo:hover{text-decoration:none}
.nav-logo svg{width:28px;height:28px}
.nav-right{font-size:.875rem;color:var(--muted)}
.nav-right a{font-weight:500;margin-left:.3rem}
.card{width:100%;max-width:420px;position:relative;z-index:1}
.card-header{text-align:center;margin-bottom:2rem}
.card-header h1{font-size:1.6rem;font-weight:700;margin-bottom:.4rem}
.card-header p{color:var(--muted);font-size:.9rem}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:.8125rem;font-weight:600;color:var(--muted);margin-bottom:.4rem}
.field input{width:100%;padding:.75rem 1rem;font-size:.9375rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:border .2s}
.field input:focus{border-color:var(--green)}
.submit-btn{width:100%;padding:.8rem;font-size:.9375rem;font-weight:600;background:var(--green);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background .2s}
.submit-btn:hover{background:var(--green-hover)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:var(--red-bg);border:1px solid rgba(239,68,68,.2);color:var(--red);padding:.75rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
.success-msg{background:var(--green-bg);border:1px solid rgba(16,185,129,.2);color:var(--green);padding:.75rem 1rem;border-radius:10px;font-size:.85rem;margin-bottom:1rem;display:none}
.back-link{display:block;text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--dim)}
.back-link a{color:var(--green)}
.footer{text-align:center;padding:1.5rem;font-size:.75rem;color:var(--dim);border-top:1px solid var(--border)}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    GovernLayer
  </a>
  <div class="nav-right">Remember your password? <a href="/login">Log in</a></div>
</nav>

<main class="page">
  <div class="glow"></div>
  <div class="card">
    <div class="card-header">
      <h1>Reset your password</h1>
      <p>Enter your email and we'll send you a reset link.</p>
    </div>
    <div class="error-msg" id="error"></div>
    <div class="success-msg" id="success"></div>
    <form id="forgotForm">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Send reset link</button>
    </form>
    <div class="back-link"><a href="/login">Back to login</a></div>
  </div>
</main>

<footer class="footer">&copy; 2026 GovernLayer. All rights reserved.</footer>

<script>
const API = window.location.origin;
const form = document.getElementById('forgotForm');
const emailInput = document.getElementById('email');
const errorEl = document.getElementById('error');
const successEl = document.getElementById('success');
const submitBtn = document.getElementById('submitBtn');

function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; successEl.style.display = 'none'; }
function showSuccess(msg) { successEl.textContent = msg; successEl.style.display = 'block'; errorEl.style.display = 'none'; }

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorEl.style.display = 'none';
  successEl.style.display = 'none';

  const email = emailInput.value.trim();
  if (!email) { showError('Enter your email address.'); emailInput.focus(); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';

  try {
    const res = await fetch(API + '/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('If an account exists with that email, a reset link has been sent. Check your inbox.');
      submitBtn.textContent = 'Sent';
    } else {
      showError(data?.detail || 'Something went wrong. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send reset link';
    }
  } catch (err) {
    showError('Network error. Please try again.');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send reset link';
  }
});
</script>
</body>
</html>
