<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#2563eb" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#2563eb" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#2563eb" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#2563eb" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#2563eb" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#2563eb" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#2563eb" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#2563eb" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#2563eb" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#2563eb" stroke-width="1"/>
  </g>

  <!-- Logo: blue rounded square with + icon -->
  <rect x="80" y="180" width="72" height="72" rx="16" fill="#2563eb"/>
  <line x1="116" y1="200" x2="116" y2="236" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="98" y1="218" x2="134" y2="218" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- GovernLayer text -->
  <text x="172" y="232" fill="#0c1222" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-1">GovernLayer</text>

  <!-- Tagline -->
  <text x="82" y="310" fill="#0c1222" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="500">Autonomous AI Compliance Platform</text>

  <!-- Subtitle: frameworks -->
  <text x="82" y="370" fill="#4b5563" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="400">SOC 2  ·  EU AI Act  ·  NIST  ·  29 Frameworks</text>

  <!-- Decorative accent bar -->
  <rect x="82" y="410" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Bottom-right domain -->
  <text x="1118" y="590" fill="#2563eb" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="500" text-anchor="end">governlayer.ai</text>

  <!-- Bottom border accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
