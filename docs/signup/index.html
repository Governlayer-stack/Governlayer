<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign Up — GovernLayer</title>
<meta name="description" content="Create your GovernLayer account. AI governance, compliance, and security for every agent and model.">
<meta name="theme-color" content="#0a0e1a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1e293b;--border:rgba(255,255,255,.1);
  --border-hover:rgba(255,255,255,.2);
  --text:#f1f5f9;--muted:#94a3b8;--dim:#64748b;
  --green:#10b981;--green-hover:#059669;--green-bg:rgba(16,185,129,.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);
}
html{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}
button,input{font-family:inherit}

/* Layout */
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;position:relative}
.glow{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,.06) 0%,rgba(59,130,246,.04) 40%,transparent 70%);pointer-events:none}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:1.1rem;color:var(--text);text-decoration:none}
.nav-logo:hover{text-decoration:none}
.nav-logo svg{width:28px;height:28px}
.nav-right{font-size:.875rem;color:var(--muted)}
.nav-right a{font-weight:500;margin-left:.3rem}

/* Card */
.card{width:100%;max-width:420px;position:relative;z-index:1}
.card-header{text-align:center;margin-bottom:2rem}
.card-header h1{font-size:1.6rem;font-weight:700;margin-bottom:.4rem}
.card-header p{color:var(--muted);font-size:.9rem}

/* SSO buttons */
.sso-buttons{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1.75rem}
.sso-btn{
  display:flex;align-items:center;justify-content:center;gap:.65rem;
  width:100%;padding:.8rem 1rem;font-size:.9375rem;font-weight:500;
  color:var(--text);background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .15s;
}
.sso-btn:hover{background:var(--surface2);border-color:var(--border-hover)}
.sso-btn:active{transform:scale(.985)}
.sso-btn svg{width:20px;height:20px;flex-shrink:0}

/* Divider */
.divider{display:flex;align-items:center;gap:1rem;margin-bottom:1.75rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:.8125rem;color:var(--dim);white-space:nowrap}

/* Form */
.form{display:none}
.form.visible{display:block}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.8125rem;font-weight:500;color:var(--muted);margin-bottom:.4rem}
.field input{
  width:100%;padding:.7rem .85rem;font-size:.9375rem;color:var(--text);
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.field input::placeholder{color:var(--dim)}
.field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.12)}
.field-error{font-size:.75rem;color:var(--red);margin-top:.3rem;display:none}
.field-error.show{display:block}

/* Password */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:3.5rem}
.pw-toggle{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:.8125rem;padding:.2rem .4rem;transition:color .15s}
.pw-toggle:hover{color:var(--muted)}
.pw-bar-wrap{height:3px;border-radius:2px;margin-top:.5rem;background:var(--surface2);overflow:hidden;opacity:0;transition:opacity .2s}
.pw-bar-wrap.show{opacity:1}
.pw-bar{height:100%;border-radius:2px;transition:width .25s,background .25s;width:0}
.pw-label{font-size:.6875rem;color:var(--dim);margin-top:.25rem;transition:color .2s}

/* Submit */
.submit-btn{
  width:100%;padding:.8rem;font-size:.9375rem;font-weight:600;
  color:#000;background:var(--green);border:none;border-radius:10px;
  cursor:pointer;transition:background .15s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  margin-top:1.5rem;
}
.submit-btn:hover{background:var(--green-hover)}
.submit-btn:active{transform:scale(.985)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:none}
.submit-btn.loading .spinner{display:block}
.submit-btn.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Back link */
.back-link{display:none;margin-bottom:1.5rem}
.back-link.show{display:flex}
.back-link a{display:flex;align-items:center;gap:.4rem;font-size:.8125rem;color:var(--dim);text-decoration:none;transition:color .15s}
.back-link a:hover{color:var(--muted);text-decoration:none}
.back-link svg{width:16px;height:16px}

/* Error box */
.error-box{background:var(--red-bg);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:.75rem 1rem;margin-bottom:1.25rem;font-size:.875rem;color:var(--red);display:none;align-items:center;gap:.5rem}
.error-box.show{display:flex}
.error-box svg{flex-shrink:0;width:18px;height:18px}

/* Success */
.success{display:none;text-align:center;padding:2rem 0}
.success.show{display:block}
.success-icon{width:56px;height:56px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.success-icon svg{width:28px;height:28px;color:var(--green)}
.success h2{font-size:1.25rem;font-weight:600;margin-bottom:.35rem}
.success p{color:var(--muted);font-size:.875rem}

/* Terms */
.terms{font-size:.75rem;color:var(--dim);text-align:center;margin-top:1rem;line-height:1.6}
.terms a{color:var(--muted)}

/* Responsive */
@media(max-width:520px){
  .nav{padding:.85rem 1.25rem}
  .card-header h1{font-size:1.35rem}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#10b981"/><path d="M9 17l4 4 10-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    GovernLayer
  </a>
  <div class="nav-right">Already have an account?<a href="/login">Log in</a></div>
</nav>

<main class="page">
  <div class="glow"></div>
  <div class="card">

    <!-- Back button (shown when email form is open) -->
    <div class="back-link" id="backLink">
      <a href="#" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        All sign up options
      </a>
    </div>

    <div class="card-header" id="cardHeader">
      <h1>Create your account</h1>
      <p>Start governing your AI systems in minutes</p>
    </div>

    <div class="error-box" id="errorBox">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-.75-11a.75.75 0 011.5 0v4a.75.75 0 01-1.5 0V7zm.75 7.5a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd"/></svg>
      <span id="errorMsg"></span>
    </div>

    <!-- Step 1: Choose method -->
    <div id="methodStep">
      <div class="sso-buttons">
        <button class="sso-btn" id="googleBtn" type="button">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09a6.87 6.87 0 010-4.18V7.07H2.18a11.01 11.01 0 000 9.86l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="sso-btn" id="microsoftBtn" type="button">
          <svg viewBox="0 0 24 24"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="13" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="13" width="10" height="10" fill="#00A4EF"/><rect x="13" y="13" width="10" height="10" fill="#FFB900"/></svg>
          Continue with Microsoft
        </button>
      </div>

      <div class="divider"><span>or sign up with email</span></div>

      <button class="sso-btn" id="emailBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/></svg>
        Continue with email
      </button>
    </div>

    <!-- Step 2: Email form -->
    <form class="form" id="emailForm" novalidate>
      <div class="field">
        <label for="email">Work email</label>
        <input type="email" id="email" placeholder="jane@company.com" autocomplete="email" required>
        <div class="field-error" id="emailError"></div>
      </div>
      <div class="field">
        <label for="company">Company</label>
        <input type="text" id="company" placeholder="Acme Corp" autocomplete="organization" required>
        <div class="field-error" id="companyError"></div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8">
          <button type="button" class="pw-toggle" id="pwToggle">Show</button>
        </div>
        <div class="pw-bar-wrap" id="pwBarWrap"><div class="pw-bar" id="pwBar"></div></div>
        <div class="pw-label" id="pwLabel"></div>
        <div class="field-error" id="passwordError"></div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Create account</span>
        <span class="spinner"></span>
      </button>
    </form>

    <!-- Success state -->
    <div class="success" id="successState">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h2>Account created</h2>
      <p>Redirecting to your workspace...</p>
    </div>

    <div class="terms" id="termsText">
      By signing up, you agree to our <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>
    </div>
  </div>
</main>

<script>
(function(){
  'use strict';

  const API = window.location.origin;

  // DOM
  const methodStep = document.getElementById('methodStep');
  const emailForm = document.getElementById('emailForm');
  const backLink = document.getElementById('backLink');
  const backBtn = document.getElementById('backBtn');
  const cardHeader = document.getElementById('cardHeader');
  const errorBox = document.getElementById('errorBox');
  const errorMsg = document.getElementById('errorMsg');
  const successState = document.getElementById('successState');
  const termsText = document.getElementById('termsText');
  const submitBtn = document.getElementById('submitBtn');
  const pwInput = document.getElementById('password');
  const pwToggle = document.getElementById('pwToggle');
  const pwBarWrap = document.getElementById('pwBarWrap');
  const pwBar = document.getElementById('pwBar');
  const pwLabel = document.getElementById('pwLabel');

  // --- SSO: Google ---
  document.getElementById('googleBtn').addEventListener('click', async () => {
    hideError();
    try {
      const res = await fetch(API + '/auth/oauth/google/authorize');
      const data = await res.json();
      if (!res.ok) {
        showError(data.detail || 'Google sign-in is not configured yet. Please use email.');
        return;
      }
      localStorage.setItem('gl_oauth_state', data.state);
      window.location.href = data.authorize_url;
    } catch {
      showError('Google sign-in is not available right now. Please use email.');
    }
  });

  // --- SSO: Microsoft ---
  document.getElementById('microsoftBtn').addEventListener('click', async () => {
    hideError();
    try {
      const res = await fetch(API + '/auth/oauth/microsoft/authorize');
      const data = await res.json();
      if (!res.ok) {
        showError(data.detail || 'Microsoft sign-in is not configured yet. Please use email.');
        return;
      }
      localStorage.setItem('gl_oauth_state', data.state);
      window.location.href = data.authorize_url;
    } catch {
      showError('Microsoft sign-in is not available right now. Please use email.');
    }
  });

  // --- Email toggle ---
  document.getElementById('emailBtn').addEventListener('click', () => {
    showEmailForm();
  });

  backBtn.addEventListener('click', (e) => {
    e.preventDefault();
    showMethodStep();
  });

  function showEmailForm() {
    methodStep.style.display = 'none';
    emailForm.classList.add('visible');
    backLink.classList.add('show');
    cardHeader.querySelector('h1').textContent = 'Create your account';
    cardHeader.querySelector('p').textContent = 'Enter your details below';
    hideError();
    document.getElementById('email').focus();
  }

  function showMethodStep() {
    methodStep.style.display = 'block';
    emailForm.classList.remove('visible');
    backLink.classList.remove('show');
    cardHeader.querySelector('h1').textContent = 'Create your account';
    cardHeader.querySelector('p').textContent = 'Start governing your AI systems in minutes';
    hideError();
  }

  // --- Password toggle ---
  pwToggle.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    pwToggle.textContent = isHidden ? 'Hide' : 'Show';
  });

  // --- Password strength ---
  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    if (!v) { pwBarWrap.classList.remove('show'); pwLabel.textContent = ''; return; }
    pwBarWrap.classList.add('show');
    let s = 0;
    if (v.length >= 8) s++;
    if (v.length >= 12) s++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
    if (/\d/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;

    const [w, c, l] = s <= 1 ? ['25%','var(--red)','Weak'] : s <= 3 ? ['60%','#f59e0b','Fair'] : ['100%','var(--green)','Strong'];
    pwBar.style.width = w; pwBar.style.background = c;
    pwLabel.textContent = l; pwLabel.style.color = c;
  });

  // --- Error helpers ---
  function showError(msg) { errorMsg.textContent = msg; errorBox.classList.add('show'); }
  function hideError() { errorBox.classList.remove('show'); }
  function showFieldError(id, msg) { const el = document.getElementById(id + 'Error'); if (el) { el.textContent = msg; el.classList.add('show'); } }
  function hideFieldError(id) { const el = document.getElementById(id + 'Error'); if (el) el.classList.remove('show'); }

  // --- Submit ---
  emailForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    ['email','company','password'].forEach(hideFieldError);

    const email = document.getElementById('email').value.trim();
    const company = document.getElementById('company').value.trim();
    const password = pwInput.value;
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    let ok = true;
    if (!email || !emailRe.test(email)) { showFieldError('email', 'Enter a valid work email.'); ok = false; }
    if (!company) { showFieldError('company', 'Company name is required.'); ok = false; }
    if (!password || password.length < 8) { showFieldError('password', 'Password must be at least 8 characters.'); ok = false; }
    else if (!/[A-Z]/.test(password)) { showFieldError('password', 'Include at least one uppercase letter.'); ok = false; }
    else if (!/[a-z]/.test(password)) { showFieldError('password', 'Include at least one lowercase letter.'); ok = false; }
    else if (!/\d/.test(password)) { showFieldError('password', 'Include at least one number.'); ok = false; }
    if (!ok) return;

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    try {
      const res = await fetch(API + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, company })
      });
      const data = await res.json();

      if (!res.ok) {
        const msg = data.detail || 'Registration failed.';
        if (/already|exists|registered/i.test(msg)) {
          showError('This email is already registered. Try logging in.');
        } else {
          showError(msg);
        }
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        return;
      }

      // Store auth
      const token = data.access_token || data.token || '';
      if (token) localStorage.setItem('gl_token', token);
      localStorage.setItem('gl_email', email);

      // Success
      emailForm.classList.remove('visible');
      backLink.classList.remove('show');
      cardHeader.style.display = 'none';
      termsText.style.display = 'none';
      successState.classList.add('show');

      setTimeout(() => { window.location.href = '/workspace'; }, 1500);
    } catch {
      showError('Unable to connect. Please try again.');
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }
  });

  // Clear field errors on input
  ['email','company','password'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => hideFieldError(id));
  });

  // If URL has ?method=email, go straight to email form
  if (new URLSearchParams(window.location.search).get('method') === 'email') {
    showEmailForm();
  }

})();
</script>
</body>
</html>
