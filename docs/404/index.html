<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | GovernLayer</title>
<meta name="description" content="The page you're looking for doesn't exist. Navigate back to GovernLayer.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f8fa;
  --border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --blue:#2563eb;--blue-dark:#1d4ed8;--blue-bg:#eff6ff;
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

/* ---- Nav ---- */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:12px 0;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1120px;margin:0 auto;padding:0 24px}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.12rem;letter-spacing:-.03em}
.logo-mark{width:26px;height:26px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px}
.nav-back a{font-size:.86rem;color:var(--text2);font-weight:500;transition:color .2s}
.nav-back a:hover{color:var(--text)}

/* ---- Main ---- */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:120px 24px 80px;text-align:center}
.content{max-width:520px}
.code{font-size:clamp(5rem,14vw,8rem);font-weight:900;letter-spacing:-.06em;line-height:1;color:var(--blue);margin-bottom:12px}
.title{font-size:clamp(1.4rem,3vw,1.8rem);font-weight:800;letter-spacing:-.03em;margin-bottom:12px}
.message{font-size:1rem;color:var(--text2);line-height:1.7;max-width:420px;margin:0 auto 32px}

/* ---- Buttons ---- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:13px 28px;border-radius:var(--radius-xs);font-size:.94rem;font-weight:600;border:none;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-fill{background:var(--blue);color:#fff}
.btn-fill:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.25)}

/* ---- Links grid ---- */
.links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:28px}
.links a{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:1px solid var(--border2);border-radius:100px;font-size:.82rem;font-weight:600;color:var(--text2);background:var(--bg);transition:all .2s}
.links a:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.links a svg{width:14px;height:14px;flex-shrink:0}

/* ---- Footer ---- */
.footer{padding:24px;text-align:center;color:var(--text3);font-size:.78rem;border-top:1px solid var(--border)}
</style>
<script defer data-domain="governlayer.ai" src="https://plausible.io/js/script.js"></script>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="logo">
      <span class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </span>
      GovernLayer
    </a>
    <div class="nav-back">
      <a href="/">Back to Home</a>
    </div>
  </div>
</nav>

<!-- Main content -->
<main class="main">
  <div class="content">
    <div class="code">404</div>
    <h1 class="title">Page not found</h1>
    <p class="message">The page you are looking for does not exist or has been moved. Use the links below to find your way back.</p>
    <a href="/" class="btn btn-fill">Go to Homepage</a>

    <div class="links">
      <a href="/demo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Demo
      </a>
      <a href="/docs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Docs
      </a>
      <a href="/trust">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Trust Center
      </a>
      <a href="/dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="footer">
  &copy; 2026 GovernLayer. All rights reserved.
</footer>

</body>
</html>
